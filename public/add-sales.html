<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Sales | Khetiojar Sales Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- Check Auth first -->
  <script src="/js/auth.js"></script>
</head>
<body>

  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg viewBox="0 0 24 24">
        <path d="M2 22h20M12 2v20M17 7c-2.67 0-5 2.18-5 5v10m-5-9c1.67 0 3-1.33 3-3V7m0 0C10 7 8 8.7 8 11v11" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      </svg>
      <span>Khetiojar</span>
    </div>
    
    <ul class="sidebar-menu">
      <li class="sidebar-item">
        <a href="/dashboard.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
          <span>Dashboard</span>
        </a>
      </li>
      <li class="sidebar-item active">
        <a href="/add-sales.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          <span>Add Sales</span>
        </a>
      </li>
      <li class="sidebar-item">
        <a href="/history.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>History Log</span>
        </a>
      </li>
      <li class="sidebar-item">
        <a href="/expenses.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
          <span>Expenses</span>
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <button id="logoutBtn" class="logout-btn">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Log Out</span>
      </button>
    </div>
  </aside>

  <!-- Main Workspace -->
  <div class="main-wrapper">
    <!-- Top Sticky Header -->
    <header class="header">
      <div class="header-title">
        <h1 id="pageActionTitle">Record Daily Sales</h1>
      </div>
      <div class="header-actions">
        <!-- Theme Toggle Switch -->
        <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Toggle theme">
          <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        
        <!-- Profile Tag -->
        <div class="user-profile">
          <div class="avatar">A</div>
          <div class="user-info">
            <div class="username">Admin User</div>
            <div class="role">Store Manager</div>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-container">
      <div class="section-card form-card">
        
        <form id="salesForm" style="display:flex; flex-direction:column; gap:1.5rem;">
          
          <!-- Date Selection -->
          <div class="form-group" style="max-width: 320px;">
            <label for="saleDate">Transaction Date</label>
            <input type="date" id="saleDate" class="form-input" required>
            <div id="dateNoticeBadge" style="display:none; font-size:0.8rem; font-weight:700; color:var(--accent-green); margin-top:0.4rem; padding: 0.25rem 0.6rem; border-radius: var(--border-radius-sm); background-color: var(--accent-green-soft); width: max-content;">
              Editing existing record for this date
            </div>
          </div>

          <!-- Dynamic Sales Record Rows -->
          <div>
            <div class="sales-row-header">
              <div>Item Names (Separate with commas)</div>
              <div>Price (₹)</div>
              <div></div>
            </div>

            <div id="salesRowsContainer" class="sales-rows-container">
              <!-- Dynamically populated rows -->
            </div>

            <!-- Action buttons below list -->
            <div style="margin-top: 1.25rem;">
              <button type="button" id="addRowBtn" class="btn btn-secondary" style="font-size: 0.875rem;">
                <!-- Plus Icon -->
                <svg viewBox="0 0 24 24" style="width: 16px; height: 16px; stroke: currentColor; fill:none; stroke-width: 2.5; margin-right: 4px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Sale Row
              </button>
            </div>
          </div>

          <!-- Grand Total Panel -->
          <div class="grand-total-display">
            <div class="grand-total-label">Grand Total</div>
            <div id="grandTotalDisplay" class="grand-total-amount">₹0</div>
          </div>

          <!-- Submit Buttons -->
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="window.history.back()">Cancel</button>
            <button type="submit" id="saveBtn" class="btn btn-primary" style="min-width: 160px; height: 46px;">
              Save Records
            </button>
          </div>

        </form>

      </div>
    </main>
  </div>

  <!-- Load Toast notifications helper -->
  <script src="/js/toast.js"></script>
  <!-- Load Form Controller -->
  <script src="/js/add-sales.js"></script>
</body>
</html>
