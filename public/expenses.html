<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses | Khetiojar Sales Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- Check Auth first -->
  <script src="/js/auth.js"></script>
</head>
<body>

  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg viewBox="0 0 24 24">
        <path d="M2 22h20M12 2v20M17 7c-2.67 0-5 2.18-5 5v10m-5-9c1.67 0 3-1.33 3-3V7m0 0C10 7 8 8.7 8 11v11" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      </svg>
      <span>Khetiojar</span>
    </div>
    
    <ul class="sidebar-menu">
      <li class="sidebar-item">
        <a href="/dashboard.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
          <span>Dashboard</span>
        </a>
      </li>
      <li class="sidebar-item">
        <a href="/add-sales.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          <span>Add Sales</span>
        </a>
      </li>
      <li class="sidebar-item">
        <a href="/history.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>History Log</span>
        </a>
      </li>
      <li class="sidebar-item active">
        <a href="/expenses.html" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
          <span>Expenses</span>
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <button id="logoutBtn" class="logout-btn">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Log Out</span>
      </button>
    </div>
  </aside>

  <!-- Main Workspace -->
  <div class="main-wrapper">
    <!-- Top Sticky Header -->
    <header class="header">
      <div class="header-title">
        <h1 id="pageActionTitle">Manage Expenses</h1>
      </div>
      <div class="header-actions">
        <!-- Theme Toggle Switch -->
        <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Toggle theme">
          <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        
        <!-- Profile Tag -->
        <div class="user-profile">
          <div class="avatar">A</div>
          <div class="user-info">
            <div class="username">Admin User</div>
            <div class="role">Store Manager</div>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-container">
      
      <!-- Add Expense Form -->
      <div class="section-card form-card" style="margin-bottom: 2rem;">
        <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Add New Expense</h2>
        <form id="expenseForm" style="display:flex; flex-wrap:wrap; gap:1.5rem; align-items:flex-end;">
          
          <div class="form-group" style="flex: 1; min-width: 150px;">
            <label for="expenseDate">Date</label>
            <input type="date" id="expenseDate" class="form-input" required>
          </div>

          <div class="form-group" style="flex: 2; min-width: 250px;">
            <label for="expenseDesc">Description / Item</label>
            <input type="text" id="expenseDesc" class="form-input" placeholder="e.g. Electricity Bill, Tea, Tools" required>
          </div>

          <div class="form-group" style="flex: 1; min-width: 150px;">
            <label for="expenseAmount">Amount (₹)</label>
            <input type="number" id="expenseAmount" class="form-input" placeholder="0" min="0" step="any" required>
          </div>

          <div class="form-group" style="flex: 1; min-width: 120px;">
            <button type="submit" id="addExpenseBtn" class="btn btn-primary" style="width: 100%; height: 46px;">
              Add Expense
            </button>
          </div>

        </form>
      </div>

      <!-- Recent Expenses List -->
      <div class="section-card table-card">
        <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Recent Expenses</h2>
        <div class="table-container" style="overflow-x: auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Amount</th>
                <th style="width: 80px; text-align: right;">Actions</th>
              </tr>
            </thead>
            <tbody id="expensesTableBody">
              <!-- Dynamically populated -->
              <tr>
                <td colspan="4" style="text-align: center; padding: 2rem;">Loading expenses...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- Load Toast notifications helper -->
  <script src="/js/toast.js"></script>
  <!-- Load Expenses Controller -->
  <script src="/js/expenses.js"></script>
</body>
</html>
