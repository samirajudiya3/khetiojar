<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History | Khetiojar Sales Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- Check Auth first -->
  <script src="/js/auth.js"></script>
</head>
<body>

  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg viewBox="0 0 24 24">
        <path d="M2 22h20M12 2v20M17 7c-2.67 0-5 2.18-5 5v10m-5-9c1.67 0 3-1.33 3-3V7m0 0C10 7 8 8.7 8 11v11" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      </svg>
      <span>Khetiojar</span>
    </div>
    
    <ul class="sidebar-menu">
      <li class="sidebar-item">
        <a href="/dashboard.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
          <span>Dashboard</span>
        </a>
      </li>
      <li class="sidebar-item">
        <a href="/add-sales.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          <span>Add Sales</span>
        </a>
      </li>
      <li class="sidebar-item active">
        <a href="/history.html" class="sidebar-link">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>History Log</span>
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <button id="logoutBtn" class="logout-btn">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Log Out</span>
      </button>
    </div>
  </aside>

  <!-- Main Workspace -->
  <div class="main-wrapper">
    <!-- Top Sticky Header -->
    <header class="header">
      <div class="header-title">
        <h1>Sales History</h1>
      </div>
      <div class="header-actions">
        <!-- Theme Toggle Switch -->
        <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Toggle theme">
          <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        
        <!-- Profile Tag -->
        <div class="user-profile">
          <div class="avatar">A</div>
          <div class="user-info">
            <div class="username">Admin User</div>
            <div class="role">Store Manager</div>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-container">
      
      <!-- Date Range Controls -->
      <section class="history-controls">
        <div class="form-group">
          <label for="startDateFilter">Start Date</label>
          <input type="date" id="startDateFilter" class="form-input">
        </div>
        <div class="form-group">
          <label for="endDateFilter">End Date</label>
          <input type="date" id="endDateFilter" class="form-input">
        </div>
        <div style="display:flex; gap: 0.75rem;">
          <button type="button" id="searchBtn" class="btn btn-primary" style="height: 44px; min-width: 100px;">
            Search
          </button>
          <button type="button" id="clearBtn" class="btn btn-secondary" style="height: 44px; min-width: 100px;">
            Clear
          </button>
        </div>
      </section>

      <!-- History Records Grid -->
      <section id="historyGrid" class="history-grid">
        <!-- Dynamically populated card skeleton displays -->
        <div class="history-card shimmer-card" style="height: 250px;">
          <div class="shimmer" style="height: 24px; width: 60%; border-radius: 4px; margin-bottom: 1.5rem;"></div>
          <div class="shimmer" style="height: 40px; border-radius: 8px; margin-bottom: 1rem;"></div>
          <div class="shimmer" style="height: 40px; border-radius: 8px; margin-bottom: 1.5rem;"></div>
          <div class="shimmer" style="height: 30px; width: 40%; border-radius: 4px; margin-top: auto;"></div>
        </div>
        <div class="history-card shimmer-card" style="height: 250px;">
          <div class="shimmer" style="height: 24px; width: 60%; border-radius: 4px; margin-bottom: 1.5rem;"></div>
          <div class="shimmer" style="height: 40px; border-radius: 8px; margin-bottom: 1rem;"></div>
          <div class="shimmer" style="height: 40px; border-radius: 8px; margin-bottom: 1.5rem;"></div>
          <div class="shimmer" style="height: 30px; width: 40%; border-radius: 4px; margin-top: auto;"></div>
        </div>
        <div class="history-card shimmer-card" style="height: 250px;">
          <div class="shimmer" style="height: 24px; width: 60%; border-radius: 4px; margin-bottom: 1.5rem;"></div>
          <div class="shimmer" style="height: 40px; border-radius: 8px; margin-bottom: 1rem;"></div>
          <div class="shimmer" style="height: 40px; border-radius: 8px; margin-bottom: 1.5rem;"></div>
          <div class="shimmer" style="height: 30px; width: 40%; border-radius: 4px; margin-top: auto;"></div>
        </div>
      </section>

    </main>
  </div>

  <!-- Sleek Custom Delete Confirmation Dialog Modal -->
  <div id="deleteModal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <h3 style="color:var(--text-primary)">Delete Daily Record?</h3>
      <p id="deleteModalDesc">Are you sure you want to permanently erase the tool sale entries for this date? This process cannot be undone.</p>
      
      <div class="modal-buttons">
        <button type="button" id="modalCancelBtn" class="btn btn-secondary">Cancel</button>
        <button type="button" id="modalConfirmBtn" class="btn btn-danger">Confirm Delete</button>
      </div>
    </div>
  </div>

  <!-- Load Toast notifications helper -->
  <script src="/js/toast.js"></script>
  <!-- Load History Logic -->
  <script src="/js/history.js"></script>
</body>
</html>
